name: Build Tailwind CSS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'styles.css'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Compile Tailwind CSS
        run: npx --yes tailwindcss@3 -c tailwind.config.js -i tailwind-input.css -o styles.css --minify
      - name: Commit built CSS if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add styles.css
          if git diff --staged --quiet; then
            echo "styles.css unchanged"
          else
            git commit -m "Build styles.css [skip ci]"
            git push
          fi
